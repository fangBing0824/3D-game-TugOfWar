<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="script.js"></script>
  </head>

  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-assets>
        <a-asset-item id="tugOfWar" src="squid_game_tug_of_war/scene.gltf"></a-asset-item>
        <audio id="bgMusic" src="TheRopeIsTie.mp3" preload="auto"></audio>
        <audio id="loseSound" src="scream.mp3"></audio>
        <audio id="winSound" src="cheer.mp3"></audio>
      </a-assets>

      <!-- Add Camera -->
      <a-camera position="0 1.6 -5"></a-camera>

      <a-box id="rope" position="0 1.6 -12" depth="0.2" height="0.2" width="1" color="red"> </a-box>
      

      <!--UI-->
      <div class="game-info">
        <div id="time-display">Time: 50</div>
        <div id="number-display">Press: </div>
      </div>
      
       <!-- Light -->
      <a-light type="directional" intensity="1" position="2 4 2"></a-light>
      <a-light type="ambient" intensity="0.6"></a-light>

      <!-- Center Line -->
      

      <!-- Tug of War Model -->
      
      <a-entity position="0 0 -25" rotation="0 90 0">
        <a-gltf-model src="#tugOfWar"></a-gltf-model>
      </a-entity>

      
    </a-scene>
  </body>
</html>
